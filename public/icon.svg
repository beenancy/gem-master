<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  {/* Dark background matching zinc-950/gray-950 */}
  <rect width="512" height="512" rx="110" fill="#030712" />
  
  {/* Layered prompt architectures icon */}
  <g transform="translate(0, 16)">
    {/* Top Layer */}
    <path d="M256 110 L410 190 L256 270 L102 190 Z" fill="url(#grad)" />
    
    {/* Middle Layer */}
    <path d="M102 240 L256 320 L410 240" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    
    {/* Bottom Layer */}
    <path d="M102 290 L256 370 L410 290" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
  </g>
</svg>
